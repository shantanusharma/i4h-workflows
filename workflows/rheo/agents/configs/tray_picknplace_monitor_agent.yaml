# Agent metadata for dynamic loading
agent_metadata:
  name: "TrayPickNPlaceMonitorAgent"
  class_name: "TrayPickNPlaceMonitorAgent"
  module: "agents.tray_picknplace_monitor_agent"
  enabled: true
  category: "background"
  priority: 60  # Must be > PeriOpAnnotationAgent (50) to ensure it's instantiated after
  requires_llm: false
  requires_visual: false
  dependencies:
    - type: "annotation_agent"
      name: "peri_op_annotation_agent"
    - type: "message_bus"
      name: "message_bus"
    - type: "get_video_source_mode"
      name: "get_video_source_mode"
    - type: "get_session_id"
      name: "get_session_id"
  lifecycle: "background"
  publishes_events:
    - "tray_alert"
    - "robot_trigger"

agent_name: "TrayPickNPlaceMonitorAgent"
description: "Monitors surgical tray visibility and triggers robot when tray is missing."

# Number of consecutive False (not visible) detections before alerting
consecutive_threshold: 2

# Robot trigger sequence name for pick-and-place policy
robot_trigger_sequence: "tray_pick_and_place"

# How often to check for new annotations (seconds)
check_interval_seconds: 5

# Alert message when tray is missing
alert_message: |
  There is a tray missing and I have located one in the surgical supply room.
  I can send a robot to retrieve it. Please say "start" to approve.
