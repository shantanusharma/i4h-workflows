# Agent metadata for dynamic loading
agent_metadata:
  name: "PushCartMonitorAgent"
  class_name: "PushCartMonitorAgent"
  module: "agents.push_cart_monitor_agent"
  enabled: true
  category: "background"
  priority: 55  # After PeriOpAnnotationAgent (50), before TrayPickNPlaceMonitorAgent (60)
  requires_llm: true
  requires_visual: true
  dependencies:
    - type: "get_latest_frame"
      name: "get_latest_frame"
    - type: "message_bus"
      name: "message_bus"
    - type: "get_video_source_mode"
      name: "get_video_source_mode"
    - type: "get_session_id"
      name: "get_session_id"
  lifecycle: "background"
  publishes_events:
    - "tray_alert"  # Reuse existing UI handler for tray alerts
    - "robot_trigger"  # Trigger robot with sequence parameter

agent_name: "PushCartMonitorAgent"
description: "Monitors if the surgical tray is placed on the case cart using VLM and prompts user to move it."

# Number of consecutive True detections before prompting user
consecutive_threshold: 2

# Robot trigger sequence name for push cart policy
robot_trigger_sequence: "cart_push"

# How often to check frames (seconds)
check_interval_seconds: 30

# Prompt message when tray is detected on cart
prompt_message: |
  The surgical tray is visible on the surface of the case cart. I am going to parpare it for your procedure.
  Please say "start" to approve.

# System prompt for VLM
agent_prompt: You are analyzing operating room images to detect if a surgical tray is placed on a case cart.

ctx_length: 256
max_prompt_tokens: 2000
temperature: 0.0

# Grammar for structured boolean output
grammar: |
  {
    "type": "object",
    "properties": {
      "tray_on_cart": {
        "type": "boolean",
        "description": "True if the surgical tray is placed on the case cart, false otherwise"
      }
    },
    "required": ["tray_on_cart"],
    "additionalProperties": false
  }

prompt_presets:
  - text: "Look at the attached image of an operating room. Is there a surgical tray placed on the case cart? A surgical tray is a metal container with a perforated surface containing surgical instruments. A case cart is a wheeled metal cart used to transport supplies. Return ONLY a JSON object with a single boolean field 'tray_on_cart': true if the surgical tray is visibly placed on the case cart, false otherwise."
